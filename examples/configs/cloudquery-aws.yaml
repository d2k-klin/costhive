# Example CloudQuery sync spec for CostHive's opt-in advanced mode.
#   costhive scan --profile p \
#     --cloudquery-db-url postgres://user:pass@localhost:5432/cq \
#     --cloudquery-spec examples/configs/cloudquery-aws.yaml
#
# See https://hub.cloudquery.io/plugins/source/cloudquery/aws for full options.
kind: source
spec:
  name: aws
  path: cloudquery/aws
  version: "v27.0.0"          # pin a version; bumps can change synced tables
  destinations: ["postgresql"]
  tables:
    - aws_ec2_instances
    - aws_ec2_ebs_volumes
    - aws_ec2_eips
    - aws_ec2_ebs_snapshots
    - aws_rds_instances
---
kind: destination
spec:
  name: postgresql
  path: cloudquery/postgresql
  version: "v8.0.0"
  spec:
    connection_string: "${COSTHIVE_CLOUDQUERY_DB_URL}"
