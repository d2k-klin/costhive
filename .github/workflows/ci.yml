name: CI

# CI validates the PROJECT, never a cloud account (addendum §1):
# no AWS credentials, no billing data, no writes/remediation — fixtures + mocks only.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read # least privilege; no id-token, no secrets

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check # ruff format is the black-equivalent formatter
        run: ruff format --check .
      - name: mypy
        run: mypy costhive

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Test (fixtures + mocks only — no AWS env, no billing, no writes)
        run: pytest --cov=costhive --cov-report=xml --cov-report=term-missing --cov-fail-under=65
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.xml

  policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install Cloud Custodian (pinned)
        run: |
          . ./tool-versions.env
          pip install "c7n==${CUSTODIAN_VERSION}" pyyaml
      - name: Validate policy packs (dry-run + no-write assertion)
        run: ./scripts/validate-policies.sh

  tool-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install bundled tool CLIs at pinned versions
        run: |
          . ./tool-versions.env
          pip install -e "." "c7n==${CUSTODIAN_VERSION}"
          curl -sSL https://steampipe.io/install/steampipe.sh | STEAMPIPE_VERSION="v${STEAMPIPE_VERSION}" sh
          curl -sSfL "https://github.com/infracost/infracost/releases/download/v${INFRACOST_VERSION}/infracost-linux-amd64.tar.gz" -o /tmp/infracost.tar.gz \
            && tar -xzf /tmp/infracost.tar.gz -C /tmp \
            && sudo mv /tmp/infracost-linux-amd64 /usr/local/bin/infracost \
            && chmod +x /usr/local/bin/infracost
          echo "/usr/local/bin" >> "$GITHUB_PATH"
      - name: Verify pinned tool versions
        run: ./scripts/verify-tools.sh

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build Docker image
        run: docker build -t costhive:ci .
      - name: Smoke test (no AWS)
        run: docker run --rm costhive:ci --version
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Build Python package
        run: |
          pip install build
          python -m build

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e "."
      - name: Check doc links
        run: python scripts/check-doc-links.py
      - name: Check CLI reference is up to date
        run: python scripts/gen-cli-reference.py --check

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: gitleaks (pinned)
        run: |
          VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks dir . --no-banner --redact

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit
